name: Agentic Loop Triage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agentic-loop
        run: pip install .

      - name: Run triage automation once
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          agentic-loop loop --every 1m \
            "Read repository issues/CI context and summarize actionable findings" \
            --once --max-turns 10

      - name: Upload run journal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-loop-runs
          path: .agentic-loop/runs/
          if-no-files-found: ignore
